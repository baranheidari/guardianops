<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>GuardianOps — Cloud Security Console</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='15' fill='%230a0e1a'/><rect width='100' height='100' rx='15' fill='none' stroke='%2300d4aa' stroke-width='6'/><text y='.88em' font-size='62' x='18' fill='%2300d4aa' font-weight='900' font-family='Arial'>G</text></svg>"/>


<style>
:root{
  --bg:oklch(0.14 0.018 245);--bg-2:oklch(0.18 0.020 245);
  --panel:oklch(0.21 0.022 245 / .75);--panel-2:oklch(0.25 0.022 245 / .55);
  --line:oklch(1 0 0 / .07);--line-2:oklch(1 0 0 / .13);
  --ink:oklch(0.97 0.005 240);--mute:oklch(0.68 0.015 245);--dim:oklch(0.52 0.015 245);
  --accent:oklch(0.76 0.15 168);--accent-2:oklch(0.84 0.11 168);--accent-soft:oklch(0.76 0.15 168 / .13);
  --crit:oklch(0.66 0.22 22);--high:oklch(0.80 0.17 55);--med:oklch(0.87 0.13 90);--low:oklch(0.70 0.04 245);
  --radius:14px;--radius-sm:8px;
  --density-pad:18px;
}
html[data-theme="bright"]{
  --bg:oklch(0.97 0.005 245);--bg-2:oklch(0.95 0.008 245);
  --panel:oklch(1 0 0 / .80);--panel-2:oklch(0.97 0.005 245 / .85);
  --line:oklch(0.15 0.015 245 / .08);--line-2:oklch(0.15 0.015 245 / .15);
  --ink:oklch(0.18 0.02 245);--mute:oklch(0.44 0.015 245);--dim:oklch(0.58 0.015 245);
}
html[data-density="cozy"] { --density-pad:24px; }
html[data-density="compact"] { --density-pad:12px; }

*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--ink);
  overflow:hidden;-webkit-font-smoothing:antialiased;letter-spacing:-.005em;
}
body::before{
  content:"";position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(800px 500px at 10% -5%, oklch(0.76 0.15 168 / .09),transparent 60%),
    radial-gradient(700px 450px at 100% 110%, oklch(0.62 0.18 265 / .07),transparent 55%),
    linear-gradient(180deg,transparent,oklch(0 0 0 / .18));
}
body::after{
  content:"";position:fixed;inset:0;pointer-events:none;z-index:0;opacity:.28;
  background-image:linear-gradient(to right,var(--line) 1px,transparent 1px),linear-gradient(to bottom,var(--line) 1px,transparent 1px);
  background-size:52px 52px;
  mask-image:radial-gradient(1200px 800px at 50% 40%,black,transparent 78%);
}
#app{position:relative;z-index:1;height:100vh;display:grid;grid-template-columns:252px 1fr;}

/* SIDEBAR */
.side{border-right:1px solid var(--line);background:linear-gradient(180deg,var(--panel),transparent);backdrop-filter:blur(16px);display:flex;flex-direction:column;padding:18px 14px;gap:4px;overflow-y:auto}
.brand{display:flex;align-items:center;gap:10px;padding:6px 8px 16px;border-bottom:1px solid var(--line);margin-bottom:8px}
.brand .logo{width:36px;height:36px;border-radius:10px;background:oklch(0.21 0.02 245);display:grid;place-items:center;overflow:hidden;box-shadow:0 0 0 1px var(--line-2),0 6px 18px oklch(0 0 0 /.3);flex-shrink:0}
.brand .logo img{width:100%;height:100%;object-fit:cover;border-radius:8px}
.brand .logo .logo-fallback{font-family:'Syne',sans-serif;font-weight:800;font-size:20px;color:var(--accent)}
.brand .name{font-family:'Syne',sans-serif;font-weight:700;font-size:15px;letter-spacing:-.01em}
.brand .name span{color:var(--accent)}
.brand .sub{font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:.14em;margin-top:2px}

.nav-group{font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:.16em;padding:14px 10px 5px}
.nav a{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:10px;color:var(--mute);text-decoration:none;font-size:13px;font-weight:500;border:1px solid transparent;transition:all .15s;cursor:pointer}
.nav a:hover{background:oklch(1 0 0 / .04);color:var(--ink)}
.nav a.active{background:linear-gradient(180deg,var(--accent-soft),oklch(0.76 0.15 168 / .05));color:var(--ink);border-color:oklch(0.76 0.15 168 / .35);box-shadow:inset 0 0 0 1px oklch(0.76 0.15 168 / .14)}
.nav a .ico{width:17px;height:17px;display:grid;place-items:center;flex-shrink:0}
.nav a .badge{margin-left:auto;font-size:10px;font-family:'IBM Plex Mono',monospace;color:var(--accent);background:var(--accent-soft);padding:1px 7px;border-radius:999px;border:1px solid oklch(0.76 0.15 168 /.35)}
.side-foot{margin-top:auto;padding:10px;border-top:1px solid var(--line);display:flex;gap:10px;align-items:center}
.side-foot .avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--accent),oklch(0.60 0.17 220));display:grid;place-items:center;font-weight:700;font-size:12px;font-family:'Syne',sans-serif;color:oklch(0.15 0 0);flex-shrink:0}
.side-foot .who{font-size:12px;font-weight:600}
.side-foot .who small{display:block;color:var(--dim);font-weight:500;font-size:10px;margin-top:1px}

/* MAIN */
.main{overflow:hidden;display:flex;flex-direction:column}
.topbar{display:flex;align-items:center;gap:12px;padding:10px 22px;border-bottom:1px solid var(--line);background:linear-gradient(180deg,var(--panel),transparent);backdrop-filter:blur(16px);min-height:56px;}
.search{flex:1;max-width:500px;position:relative;}
.search input{width:100%;padding:8px 14px 8px 36px;border-radius:10px;background:oklch(1 0 0 / .04);border:1px solid var(--line-2);color:var(--ink);font:inherit;font-size:13px;outline:none;transition:border-color .15s;}
.search input:focus{border-color:oklch(0.76 0.15 168 / .5)}
.search input::placeholder{color:var(--dim)}
.search .si{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--dim)}
.kbd{position:absolute;right:9px;top:50%;transform:translateY(-50%);font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--dim);background:oklch(1 0 0 / .06);border:1px solid var(--line-2);padding:2px 6px;border-radius:5px}
.topbar .spacer{flex:1}
.chip{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:999px;font-size:11px;font-weight:600;border:1px solid var(--line-2);color:var(--mute);background:oklch(1 0 0 / .03)}
.chip .dot{width:6px;height:6px;border-radius:50%;background:var(--accent);box-shadow:0 0 8px var(--accent);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.icon-btn{width:34px;height:34px;border-radius:9px;border:1px solid var(--line-2);background:oklch(1 0 0 / .03);color:var(--mute);cursor:pointer;display:grid;place-items:center;transition:all .15s;position:relative}
.icon-btn:hover{color:var(--ink);border-color:oklch(0.76 0.15 168 /.4)}
.icon-btn .nd{position:absolute;top:6px;right:6px;width:7px;height:7px;border-radius:50%;background:var(--crit);border:1.5px solid var(--bg-2)}

/* THEME TOGGLE in topbar */
.theme-seg{display:inline-flex;background:oklch(1 0 0 /.04);border:1px solid var(--line-2);border-radius:9px;padding:2px;gap:1px}
.theme-seg button{width:28px;height:28px;border:none;background:transparent;color:var(--dim);font-size:13px;border-radius:7px;cursor:pointer;transition:all .15s;display:grid;place-items:center}
.theme-seg button.on{background:var(--accent-soft);color:var(--accent)}

/* VIEW */
.view{flex:1;overflow-y:auto;padding:22px 26px 60px;scroll-behavior:smooth}
.view::-webkit-scrollbar{width:8px}
.view::-webkit-scrollbar-thumb{background:oklch(1 0 0 /.07);border-radius:8px}
.view::-webkit-scrollbar-thumb:hover{background:oklch(1 0 0 /.13)}
.view-head{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:20px;gap:16px;flex-wrap:wrap}
.view-head h1{font-family:'Syne',sans-serif;font-size:24px;font-weight:700;letter-spacing:-.02em}
.view-head h1 .dim{color:var(--dim);font-weight:500}
.view-head p{color:var(--mute);font-size:12.5px;margin-top:5px}
.view-head .meta{display:flex;gap:8px;align-items:center}

.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.grid-2{display:grid;grid-template-columns:1.4fr 1fr;gap:14px}

.card{background:linear-gradient(180deg,var(--panel),var(--panel-2));border:1px solid var(--line);border-radius:var(--radius);padding:var(--density-pad);position:relative;backdrop-filter:blur(12px)}
.card .card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.card .card-title{font-size:10.5px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--dim);font-family:'IBM Plex Mono',monospace}
.card .card-act{font-size:11.5px;color:var(--accent);cursor:pointer;font-weight:600}

.stat{padding:var(--density-pad);position:relative;overflow:hidden}
.stat .lbl{font-size:10.5px;color:var(--dim);text-transform:uppercase;letter-spacing:.14em;font-weight:600}
.stat .val{font-family:'Syne',sans-serif;font-size:36px;font-weight:700;letter-spacing:-.02em;margin-top:10px;line-height:1}
.stat .delta{font-size:11px;color:var(--mute);margin-top:7px}
.stat .delta .up{color:var(--crit)}.stat .delta .down{color:var(--accent)}
.stat .spark{position:absolute;right:14px;top:14px;opacity:.9}
.stat::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:3px 0 0 3px;background:var(--bar,var(--accent))}
.stat.is-crit .val{color:var(--crit)}.stat.is-crit::before{--bar:var(--crit)}
.stat.is-high .val{color:var(--high)}.stat.is-high::before{--bar:var(--high)}
.stat.is-med  .val{color:var(--med)}.stat.is-med::before{--bar:var(--med)}
.stat.is-acc  .val{color:var(--accent)}.stat.is-acc::before{--bar:var(--accent)}

/* TABLE */
table{width:100%;border-collapse:collapse}
th{text-align:left;font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:.12em;font-weight:700;padding:9px 12px;border-bottom:1px solid var(--line-2);font-family:'IBM Plex Mono',monospace}
td{padding:12px 12px;font-size:12.5px;border-bottom:1px solid var(--line);vertical-align:middle}
tr:last-child td{border-bottom:none}
tbody tr{transition:background .1s;cursor:pointer}
tbody tr:hover{background:oklch(1 0 0 / .03)}
tbody tr.new-row{animation:slideIn .5s ease}
@keyframes slideIn{from{background:oklch(0.76 0.15 168 / .13);transform:translateY(-3px)}to{background:transparent;transform:none}}

.mono{font-family:'IBM Plex Mono',monospace;font-size:12px}
.pill{display:inline-flex;align-items:center;padding:2px 8px;border-radius:999px;font-size:10px;font-weight:700;letter-spacing:.05em;border:1px solid;font-family:'IBM Plex Mono',monospace}
.pill-CRITICAL{color:var(--crit);background:oklch(0.66 0.22 22 / .13);border-color:oklch(0.66 0.22 22 / .38)}
.pill-HIGH{color:var(--high);background:oklch(0.80 0.17 55 / .13);border-color:oklch(0.80 0.17 55 / .38)}
.pill-MEDIUM{color:var(--med);background:oklch(0.87 0.13 90 / .13);border-color:oklch(0.87 0.13 90 / .38)}
.pill-LOW{color:var(--low);background:oklch(0.70 0.04 245 / .13);border-color:oklch(0.70 0.04 245 / .38)}

.status{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;font-weight:600;white-space:nowrap}
.sdot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.s-Auto-Blocked .sdot{background:var(--accent);box-shadow:0 0 6px var(--accent)}
.s-Investigating .sdot{background:var(--high)}
.s-Resolved .sdot{background:var(--low)}

.iptag{display:inline-block;font-size:9.5px;padding:1px 5px;border-radius:4px;margin-left:5px;font-family:'IBM Plex Mono',monospace;font-weight:700;vertical-align:middle}
.ip-ext{color:var(--high)}.ext{background:oklch(0.80 0.17 55 / .14);color:var(--high);border:1px solid oklch(0.80 0.17 55 / .3)}
.ip-int{color:var(--mute)}.int{background:oklch(1 0 0 / .05);color:var(--mute);border:1px solid var(--line-2)}

.region-flag{font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:var(--mute)}

/* CHIPS FILTER */
.chips{display:flex;gap:6px;flex-wrap:wrap}
.chipf{display:inline-flex;align-items:center;gap:5px;padding:5px 10px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid var(--line-2);color:var(--mute);background:oklch(1 0 0 / .02);transition:all .15s}
.chipf:hover{border-color:oklch(0.76 0.15 168 /.4);color:var(--ink)}
.chipf.active{background:var(--accent-soft);color:var(--accent);border-color:oklch(0.76 0.15 168 /.4)}
.chipf .count{font-size:10px;font-family:'IBM Plex Mono',monospace;background:oklch(1 0 0 / .06);padding:0 5px;border-radius:4px}

/* PLAYBOOKS */
.pb-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.pb{background:linear-gradient(180deg,var(--panel),var(--panel-2));border:1px solid var(--line);border-radius:var(--radius);padding:16px;display:flex;flex-direction:column;gap:10px;transition:border-color .15s}
.pb:hover{border-color:var(--line-2)}
.pb-top{display:flex;gap:12px;align-items:flex-start}
.pb-ico{width:38px;height:38px;border-radius:9px;background:var(--accent-soft);color:var(--accent);display:grid;place-items:center;flex-shrink:0}
.pb h3{font-size:13.5px;font-weight:600;letter-spacing:-.005em}
.pb p{font-size:12px;color:var(--mute);margin-top:3px;line-height:1.5}
.pb-foot{display:flex;align-items:center;justify-content:space-between;padding-top:10px;border-top:1px solid var(--line);margin-top:auto}
.pb-tag{font-size:10px;color:var(--dim);font-family:'IBM Plex Mono',monospace}
.pb .btn{padding:6px 12px;border-radius:7px;font-size:11.5px;font-weight:600;border:1px solid oklch(0.76 0.15 168 /.4);background:var(--accent-soft);color:var(--accent);cursor:pointer;transition:all .15s;font-family:inherit;display:inline-flex;align-items:center;gap:5px}
.pb .btn:hover{background:oklch(0.76 0.15 168 /.22)}
.pb.destructive .pb-ico{background:oklch(0.66 0.22 22 / .13);color:var(--crit)}
.pb.destructive .btn{border-color:oklch(0.66 0.22 22 /.35);background:oklch(0.66 0.22 22 /.09);color:var(--crit)}
.pb.destructive .btn:hover{background:oklch(0.66 0.22 22 /.18)}

/* INFO ROWS */
.info-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px dashed var(--line);font-size:12.5px}
.info-row:last-child{border-bottom:none}
.info-row .k{color:var(--mute)}.info-row .v{font-weight:500}.info-row .v.acc{color:var(--accent)}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:oklch(0 0 0 /.55);backdrop-filter:blur(5px);z-index:50;display:grid;place-items:center;animation:fadeIn .18s}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{background:var(--bg-2);border:1px solid var(--line-2);border-radius:16px;padding:26px;width:min(500px,90vw);box-shadow:0 24px 70px oklch(0 0 0 /.55);animation:rise .22s}
@keyframes rise{from{transform:translateY(10px);opacity:0}to{transform:none;opacity:1}}
.modal h2{font-family:'Syne',sans-serif;font-size:18px;margin-bottom:6px;letter-spacing:-.01em}
.modal p{color:var(--mute);font-size:13px;margin-bottom:16px;line-height:1.5}
.modal .mrow{background:oklch(1 0 0 / .04);border:1px solid var(--line);border-radius:10px;padding:12px 14px;margin-bottom:14px;font-size:12px}
.modal .mrow .k{color:var(--dim);font-size:10px;text-transform:uppercase;letter-spacing:.12em;margin-bottom:3px;font-family:'IBM Plex Mono',monospace}
.modal .foot{display:flex;gap:8px;justify-content:flex-end;margin-top:4px}
.modal button{padding:8px 16px;border-radius:8px;font-size:12.5px;font-weight:600;cursor:pointer;border:1px solid var(--line-2);background:transparent;color:var(--ink);font-family:inherit;transition:all .15s}
.modal button:hover{background:oklch(1 0 0 / .05)}
.modal button.primary{background:var(--accent);color:oklch(0.12 0 0);border-color:var(--accent)}
.modal button.danger{background:var(--crit);color:white;border-color:var(--crit)}
/* evidence box */
.evidence-box{background:oklch(0 0 0 /.25);border:1px solid var(--line);border-radius:10px;padding:12px 14px;margin-bottom:14px;font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--mute);line-height:1.7;max-height:130px;overflow:auto}
.evidence-box .ev-line-ok{color:var(--accent)}
.evidence-box .ev-line-warn{color:var(--high)}
.evidence-box .ev-line-err{color:var(--crit)}

/* INCIDENT DRAWER */
.drawer-bg{position:fixed;inset:0;background:oklch(0 0 0 /.4);backdrop-filter:blur(3px);z-index:45;animation:fadeIn .18s}
.drawer{position:fixed;top:0;right:0;bottom:0;width:min(520px,92vw);background:var(--bg-2);border-left:1px solid var(--line-2);z-index:46;display:flex;flex-direction:column;animation:slideRight .22s ease;box-shadow:-20px 0 60px oklch(0 0 0 /.4);overflow:hidden}
@keyframes slideRight{from{transform:translateX(40px);opacity:0}to{transform:none;opacity:1}}
.drawer-head{padding:20px 20px 16px;border-bottom:1px solid var(--line);display:flex;align-items:flex-start;gap:12px}
.drawer-head .close-btn{margin-left:auto;width:30px;height:30px;border:1px solid var(--line-2);border-radius:7px;background:transparent;color:var(--mute);cursor:pointer;display:grid;place-items:center;transition:all .15s;flex-shrink:0}
.drawer-head .close-btn:hover{color:var(--ink);border-color:var(--line-2)}
.drawer-body{flex:1;overflow-y:auto;padding:18px 20px}
.drawer-body::-webkit-scrollbar{width:6px}
.drawer-body::-webkit-scrollbar-thumb{background:oklch(1 0 0 /.07);border-radius:6px}
.drawer-section{margin-bottom:18px}
.drawer-section-title{font-size:10px;font-family:'IBM Plex Mono',monospace;font-weight:700;text-transform:uppercase;letter-spacing:.16em;color:var(--dim);margin-bottom:10px}
.timeline-item{display:flex;gap:12px;padding:8px 0;border-bottom:1px dashed var(--line)}
.timeline-item:last-child{border-bottom:none}
.tl-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:5px}
.json-block{background:oklch(0 0 0 / .25);border:1px solid var(--line);border-radius:8px;padding:12px;font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--mute);line-height:1.7;max-height:200px;overflow:auto;white-space:pre}
.drawer-foot{padding:14px 20px;border-top:1px solid var(--line);display:flex;gap:8px}

/* COMPLIANCE STRIP */
.compliance-strip{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
.comp-tile{background:linear-gradient(180deg,var(--panel),var(--panel-2));border:1px solid var(--line);border-radius:12px;padding:14px;position:relative;overflow:hidden;cursor:pointer;transition:border-color .15s}
.comp-tile:hover{border-color:var(--line-2)}
.comp-tile .comp-name{font-size:10px;font-family:'IBM Plex Mono',monospace;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--dim)}
.comp-tile .comp-score{font-family:'Syne',sans-serif;font-size:28px;font-weight:700;margin:6px 0 4px;letter-spacing:-.02em}
.comp-tile .comp-badge{display:inline-flex;align-items:center;gap:5px;font-size:10.5px;font-weight:700;padding:2px 7px;border-radius:999px;border:1px solid}
.comp-pass .comp-score{color:var(--accent)}.comp-pass .comp-badge{color:var(--accent);background:var(--accent-soft);border-color:oklch(0.76 0.15 168 /.35)}
.comp-warn .comp-score{color:var(--high)}.comp-warn .comp-badge{color:var(--high);background:oklch(0.80 0.17 55 / .12);border-color:oklch(0.80 0.17 55 / .3)}
.comp-tile::after{content:"";position:absolute;right:-10px;bottom:-14px;width:60px;height:60px;border-radius:50%;background:currentColor;opacity:.04}

/* HEATMAP */
.heat{display:grid;grid-template-columns:52px repeat(24,1fr);gap:2px;align-items:center}
.hhead{font-size:9px;color:var(--dim);text-align:center;font-family:'IBM Plex Mono',monospace}
.hlabel{font-size:10px;color:var(--dim);font-family:'IBM Plex Mono',monospace;font-weight:700;padding-right:6px}
.hcell{height:18px;border-radius:3px;transition:transform .12s,filter .12s;cursor:default}
.hcell:hover{transform:scale(1.3);filter:brightness(1.3);z-index:2;position:relative}

/* COMMAND PALETTE */
.cmdk-bg{position:fixed;inset:0;background:oklch(0 0 0 /.55);backdrop-filter:blur(5px);z-index:60;animation:fadeIn .14s}
.cmdk{position:fixed;top:12%;left:50%;transform:translateX(-50%);width:min(560px,92vw);background:var(--bg-2);border:1px solid var(--line-2);border-radius:14px;box-shadow:0 30px 80px oklch(0 0 0 /.6);z-index:61;overflow:hidden;animation:rise .17s}
.cmdk input{width:100%;padding:15px 18px;border:none;background:transparent;color:var(--ink);font:inherit;font-size:14.5px;outline:none;border-bottom:1px solid var(--line)}
.cmdk input::placeholder{color:var(--dim)}
.cmdk ul{list-style:none;max-height:360px;overflow:auto;padding:6px}
.cmdk li{padding:9px 12px;border-radius:8px;display:flex;align-items:center;gap:10px;font-size:12.5px;cursor:pointer;color:var(--mute)}
.cmdk li.sel{background:var(--accent-soft);color:var(--ink)}
.cmdk li .grp{margin-left:auto;font-size:9.5px;color:var(--dim);font-family:'IBM Plex Mono',monospace}
.cmdk-section{padding:6px 12px 4px;font-size:9px;color:var(--dim);text-transform:uppercase;letter-spacing:.14em;font-family:'IBM Plex Mono',monospace;font-weight:700}

/* SHORTCUTS OVERLAY */
.shortcuts-bg{position:fixed;inset:0;background:oklch(0 0 0 /.6);backdrop-filter:blur(5px);z-index:65;display:grid;place-items:center;animation:fadeIn .18s}
.shortcuts{background:var(--bg-2);border:1px solid var(--line-2);border-radius:16px;padding:26px;width:min(480px,90vw);box-shadow:0 24px 60px oklch(0 0 0 /.5);animation:rise .22s}
.shortcuts h3{font-family:'Syne',sans-serif;font-size:16px;font-weight:700;margin-bottom:18px;display:flex;align-items:center;justify-content:space-between}
.sc-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.sc-item{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;border-radius:8px;background:oklch(1 0 0 / .03);border:1px solid var(--line)}
.sc-item .sc-key{font-family:'IBM Plex Mono',monospace;font-size:11px;background:oklch(1 0 0 / .07);border:1px solid var(--line-2);padding:2px 7px;border-radius:5px;color:var(--accent)}
.sc-item .sc-desc{font-size:11.5px;color:var(--mute)}

/* ALERT RULES PAGE */
.rule-card{background:linear-gradient(180deg,var(--panel),var(--panel-2));border:1px solid var(--line);border-radius:12px;padding:14px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:border-color .15s}
.rule-card:hover{border-color:var(--line-2)}
.rule-enabled{border-left:3px solid var(--accent)}
.rule-disabled{border-left:3px solid var(--line-2);opacity:.65}
.rule-pill{display:inline-flex;padding:2px 8px;border-radius:999px;font-size:10px;font-family:'IBM Plex Mono',monospace;font-weight:700;border:1px solid}

/* ACTIVITY FEED */
.feed-item{display:flex;gap:10px;padding:9px 0;border-bottom:1px dashed var(--line)}
.feed-item:last-child{border-bottom:none}
.feed-av{width:26px;height:26px;border-radius:50%;display:grid;place-items:center;font-size:10px;font-weight:700;font-family:'Syne',sans-serif;flex-shrink:0}

/* SKELETON */
.skel{background:linear-gradient(90deg,oklch(1 0 0 /.04) 25%,oklch(1 0 0 /.07) 50%,oklch(1 0 0 /.04) 75%);background-size:400% 100%;animation:shimmer 1.5s infinite;border-radius:6px}
@keyframes shimmer{0%{background-position:100% 0}100%{background-position:-100% 0}}
.skel-row{height:38px;margin-bottom:8px}
.skel-title{height:14px;width:120px;margin-bottom:12px}

/* TOAST */
.toast-wrap{position:fixed;top:70px;right:20px;z-index:70;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{background:var(--bg-2);border:1px solid oklch(0.76 0.15 168 /.4);border-left:3px solid var(--accent);padding:11px 14px;border-radius:10px;font-size:12px;min-width:250px;box-shadow:0 10px 28px oklch(0 0 0 /.3);animation:rise .22s;display:flex;align-items:flex-start;gap:10px}
.toast .tt{font-weight:600;color:var(--ink)}.toast .td{color:var(--mute);font-size:11px;margin-top:2px}
.toast.out{animation:fadeOut .3s forwards}
@keyframes fadeOut{to{opacity:0;transform:translateX(18px)}}

/* MISC */
.empty{padding:48px 20px;text-align:center;color:var(--dim);font-size:13px}
.t-dim{color:var(--dim)}
.divider{height:1px;background:var(--line);margin:12px 0}
.v-acc{color:var(--accent)!important}

@media(max-width:1100px){.grid-4{grid-template-columns:repeat(2,1fr)}.grid-3{grid-template-columns:1fr}.grid-2{grid-template-columns:1fr}.pb-grid{grid-template-columns:1fr 1fr}.compliance-strip{grid-template-columns:1fr}}
@media(max-width:820px){#app{grid-template-columns:1fr}.side{display:none}}
