<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>GuardianOps — Cloud Security Console</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<link rel="icon" type="image/png" href="assets/G.png"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:      oklch(0.16 0.018 245);
    --bg-2:    oklch(0.20 0.020 245);
    --panel:   oklch(0.22 0.022 245 / .72);
    --panel-2: oklch(0.26 0.022 245 / .55);
    --line:    oklch(1 0 0 / .07);
    --line-2:  oklch(1 0 0 / .13);
    --ink:     oklch(0.97 0.005 240);
    --mute:    oklch(0.70 0.015 245);
    --dim:     oklch(0.55 0.015 245);
    --accent:  oklch(0.74 0.16 160);
    --accent-2:oklch(0.82 0.12 165);
    --accent-soft: oklch(0.74 0.16 160 / .14);
    --crit:    oklch(0.68 0.22 25);
    --high:    oklch(0.78 0.17 55);
    --med:     oklch(0.85 0.14 90);
    --low:     oklch(0.72 0.03 245);
    --radius:  14px;
    --radius-sm: 8px;
  }
  html[data-theme="bright"]{
    --bg:      oklch(0.98 0.005 245);
    --bg-2:    oklch(0.96 0.008 245);
    --panel:   oklch(1 0 0 / .75);
    --panel-2: oklch(0.98 0.005 245 / .85);
    --line:    oklch(0.15 0.015 245 / .09);
    --line-2:  oklch(0.15 0.015 245 / .16);
    --ink:     oklch(0.20 0.02 245);
    --mute:    oklch(0.45 0.015 245);
    --dim:     oklch(0.60 0.015 245);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:'Inter',system-ui,-apple-system,sans-serif;
    background:var(--bg);
    color:var(--ink);
    overflow:hidden;
    font-feature-settings:"ss01","cv11";
    -webkit-font-smoothing:antialiased;
    letter-spacing:-0.005em;
  }
  /* ambient background — subtle aurora + grid */
  body::before{
    content:"";position:fixed;inset:0;pointer-events:none;z-index:0;
    background:
      radial-gradient(900px 600px at 15% -10%, oklch(0.74 0.16 160 / .10), transparent 60%),
      radial-gradient(800px 500px at 95% 110%, oklch(0.65 0.18 260 / .08), transparent 55%),
      linear-gradient(180deg, transparent, oklch(0 0 0 / .2));
  }
  body::after{
    content:"";position:fixed;inset:0;pointer-events:none;z-index:0;opacity:.35;
    background-image:
      linear-gradient(to right, var(--line) 1px, transparent 1px),
      linear-gradient(to bottom, var(--line) 1px, transparent 1px);
    background-size: 48px 48px;
    mask-image:radial-gradient(1200px 800px at 50% 40%, black, transparent 80%);
  }
  #app{position:relative;z-index:1;height:100vh;display:grid;grid-template-columns:248px 1fr;}

  /* ---------- SIDEBAR ---------- */
  .side{
    border-right:1px solid var(--line);
    background:linear-gradient(180deg, var(--panel), transparent);
    backdrop-filter:blur(14px);
    display:flex;flex-direction:column;
    padding:18px 14px;gap:6px;
  }
  .brand{display:flex;align-items:center;gap:10px;padding:6px 8px 14px 8px;border-bottom:1px solid var(--line);margin-bottom:10px}
  .brand .logo{width:34px;height:34px;border-radius:9px;background:oklch(0.22 0.02 245);display:grid;place-items:center;overflow:hidden;box-shadow:0 0 0 1px var(--line-2), 0 6px 18px oklch(0 0 0 /.3)}
  .brand .logo img{width:100%;height:100%;object-fit:cover}
  .brand .name{font-weight:700;font-size:15px;letter-spacing:-.01em}
  .brand .name span{color:var(--accent)}
  .brand .sub{font-size:10.5px;color:var(--dim);text-transform:uppercase;letter-spacing:.12em;margin-top:2px}

  .nav-group{font-size:10.5px;color:var(--dim);text-transform:uppercase;letter-spacing:.14em;padding:14px 10px 6px}
  .nav a{
    display:flex;align-items:center;gap:11px;padding:9px 10px;border-radius:10px;
    color:var(--mute);text-decoration:none;font-size:13.5px;font-weight:500;
    border:1px solid transparent;transition:all .15s ease;cursor:pointer;
  }
  .nav a:hover{background:oklch(1 0 0 / .04);color:var(--ink)}
  .nav a.active{
    background:linear-gradient(180deg, var(--accent-soft), oklch(0.74 0.16 160 / .05));
    color:var(--ink);border-color:oklch(0.74 0.16 160 / .35);
    box-shadow:inset 0 0 0 1px oklch(0.74 0.16 160 / .15);
  }
  .nav a .ico{width:18px;height:18px;display:grid;place-items:center;color:currentColor}
  .nav a .badge{margin-left:auto;font-size:10.5px;font-family:'JetBrains Mono',monospace;color:var(--accent);background:var(--accent-soft);padding:1px 7px;border-radius:999px;border:1px solid oklch(0.74 0.16 160 /.35)}
  .nav a.active .badge{background:oklch(0.74 0.16 160 /.22)}

  .side-foot{margin-top:auto;padding:10px;border-top:1px solid var(--line);display:flex;gap:8px;align-items:center}
  .side-foot .avatar{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg, oklch(0.74 0.16 160), oklch(0.60 0.17 220));display:grid;place-items:center;font-weight:700;font-size:12px;color:oklch(0.15 0 0)}
  .side-foot .who{font-size:12px;font-weight:600}
  .side-foot .who small{display:block;color:var(--dim);font-weight:500;font-size:10.5px;margin-top:1px}

  /* ---------- MAIN ---------- */
  .main{overflow:hidden;display:flex;flex-direction:column}
  .topbar{
    display:flex;align-items:center;gap:14px;padding:12px 22px;
    border-bottom:1px solid var(--line);
    background:linear-gradient(180deg, var(--panel), transparent);
    backdrop-filter:blur(14px);
    min-height:58px;
  }
  .search{
    flex:1;max-width:520px;position:relative;
  }
  .search input{
    width:100%;padding:9px 14px 9px 38px;border-radius:10px;
    background:oklch(1 0 0 / .04);border:1px solid var(--line-2);
    color:var(--ink);font:inherit;font-size:13px;outline:none;
    transition:border-color .15s;
  }
  .search input::placeholder{color:var(--dim)}
  .search input:focus{border-color:oklch(0.74 0.16 160 / .5)}
  .search .si{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--dim)}
  .kbd{
    position:absolute;right:10px;top:50%;transform:translateY(-50%);
    font-family:'JetBrains Mono',monospace;font-size:10.5px;color:var(--dim);
    background:oklch(1 0 0 / .06);border:1px solid var(--line-2);padding:2px 6px;border-radius:5px;
  }

  .topbar .spacer{flex:1}
  .chip{
    display:inline-flex;align-items:center;gap:7px;padding:5px 10px;border-radius:999px;
    font-size:11.5px;font-weight:600;border:1px solid var(--line-2);color:var(--mute);
    background:oklch(1 0 0 / .03);
  }
  .chip .dot{width:6px;height:6px;border-radius:50%;background:var(--accent);box-shadow:0 0 8px var(--accent);animation:pulse 2s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.45}}
  .icon-btn{
    width:34px;height:34px;border-radius:9px;border:1px solid var(--line-2);
    background:oklch(1 0 0 / .03);color:var(--mute);cursor:pointer;
    display:grid;place-items:center;transition:all .15s;
  }
  .icon-btn:hover{color:var(--ink);border-color:oklch(0.74 0.16 160 /.4)}
  .icon-btn .nd{position:absolute;top:6px;right:6px;width:7px;height:7px;border-radius:50%;background:var(--crit)}
  .icon-btn{position:relative}

  /* ---------- CONTENT ---------- */
  .view{flex:1;overflow-y:auto;padding:24px 28px 60px}
  .view::-webkit-scrollbar{width:10px}
  .view::-webkit-scrollbar-thumb{background:oklch(1 0 0 /.08);border-radius:10px}
  .view::-webkit-scrollbar-thumb:hover{background:oklch(1 0 0 /.14)}

  .view-head{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:22px;gap:20px;flex-wrap:wrap}
  .view-head h1{font-size:26px;font-weight:700;letter-spacing:-.02em}
  .view-head h1 .dim{color:var(--dim);font-weight:500}
  .view-head p{color:var(--mute);font-size:13px;margin-top:6px}
  .view-head .meta{display:flex;gap:8px;align-items:center;flex-wrap:wrap}

  .grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
  .grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
  .grid-2{display:grid;grid-template-columns:1.4fr 1fr;gap:16px}

  .card{
    background:linear-gradient(180deg, var(--panel), var(--panel-2));
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:18px;
    position:relative;
    backdrop-filter:blur(10px);
  }
  .card .card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
  .card .card-title{font-size:11px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--dim)}
  .card .card-act{font-size:12px;color:var(--accent);text-decoration:none;font-weight:500;cursor:pointer}
  .card .card-act:hover{text-decoration:underline}

  /* stat card */
  .stat{
    padding:18px;position:relative;overflow:hidden;
  }
  .stat .lbl{font-size:11px;color:var(--dim);text-transform:uppercase;letter-spacing:.12em;font-weight:600}
  .stat .val{font-family:'Inter',sans-serif;font-size:34px;font-weight:700;letter-spacing:-.02em;margin-top:10px;line-height:1}
  .stat .delta{font-size:11.5px;color:var(--mute);margin-top:8px;display:flex;align-items:center;gap:6px}
  .stat .delta .up{color:var(--crit)}
  .stat .delta .down{color:var(--accent)}
  .stat .spark{position:absolute;right:14px;top:14px;opacity:.85}
  .stat.is-crit .val{color:var(--crit)}
  .stat.is-high .val{color:var(--high)}
  .stat.is-med  .val{color:var(--med)}
  .stat.is-acc  .val{color:var(--accent)}
  .stat::before{
    content:"";position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:3px 0 0 3px;
    background:var(--bar, var(--accent));
  }
  .stat.is-crit::before{--bar:var(--crit)}
  .stat.is-high::before{--bar:var(--high)}
  .stat.is-med::before{--bar:var(--med)}
  .stat.is-acc::before{--bar:var(--accent)}

  /* table */
  table{width:100%;border-collapse:collapse}
  th{
    text-align:left;font-size:10.5px;color:var(--dim);text-transform:uppercase;letter-spacing:.1em;
    font-weight:600;padding:10px 12px;border-bottom:1px solid var(--line-2);
  }
  td{padding:13px 12px;font-size:13px;border-bottom:1px solid var(--line);vertical-align:middle}
  tr:last-child td{border-bottom:none}
  tbody tr{transition:background .12s}
  tbody tr:hover{background:oklch(1 0 0 / .03)}
  tbody tr.new-row{animation:slideIn .5s ease}
  @keyframes slideIn{from{background:oklch(0.74 0.16 160 / .15);transform:translateY(-4px)}to{background:transparent;transform:translateY(0)}}

  .mono{font-family:'JetBrains Mono',monospace;font-size:12.5px}
  .pill{
    display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:999px;
    font-size:10.5px;font-weight:700;letter-spacing:.04em;border:1px solid;
  }
  .pill-CRITICAL{color:var(--crit);background:oklch(0.68 0.22 25 / .14);border-color:oklch(0.68 0.22 25 / .4)}
  .pill-HIGH{color:var(--high);background:oklch(0.78 0.17 55 / .14);border-color:oklch(0.78 0.17 55 / .4)}
  .pill-MEDIUM{color:var(--med);background:oklch(0.85 0.14 90 / .14);border-color:oklch(0.85 0.14 90 / .4)}
  .pill-LOW{color:var(--low);background:oklch(0.72 0.03 245 / .14);border-color:oklch(0.72 0.03 245 / .4)}
  .pill::before{content:"";width:5px;height:5px;border-radius:50%;background:currentColor}

  .status{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;font-weight:500}
  .status .sdot{width:6px;height:6px;border-radius:50%}
  .s-Auto-Blocked .sdot{background:var(--accent);box-shadow:0 0 6px var(--accent)}
  .s-Investigating .sdot{background:var(--med);box-shadow:0 0 6px var(--med);animation:pulse 1.5s infinite}
  .s-Resolved .sdot{background:var(--dim)}
  .s-Auto-Blocked{color:var(--accent)}
  .s-Investigating{color:var(--med)}
  .s-Resolved{color:var(--mute)}

  .iptag{font-size:9.5px;font-weight:700;padding:1px 5px;border-radius:4px;margin-left:6px;vertical-align:middle;letter-spacing:.05em}
  .iptag.ext{color:var(--high);background:oklch(0.78 0.17 55 / .14);border:1px solid oklch(0.78 0.17 55 / .35)}
  .iptag.int{color:var(--mute);background:oklch(1 0 0 / .05);border:1px solid var(--line-2)}
  .ip-ext{color:var(--high)}
  .ip-int{color:var(--mute)}

  /* filter chips */
  .chips{display:flex;gap:8px;flex-wrap:wrap}
  .chipf{
    padding:6px 12px;border-radius:999px;font-size:12px;border:1px solid var(--line-2);
    background:oklch(1 0 0 / .03);color:var(--mute);cursor:pointer;user-select:none;
    font-weight:500;transition:all .15s;display:inline-flex;align-items:center;gap:6px;
  }
  .chipf:hover{color:var(--ink)}
  .chipf.active{background:var(--accent-soft);color:var(--accent);border-color:oklch(0.74 0.16 160 / .45)}
  .chipf .count{font-family:'JetBrains Mono',monospace;font-size:10.5px;opacity:.7}

  /* sparkline */
  .spark-sm{height:30px;width:100%}

  /* heatmap */
  .heat{display:grid;grid-template-columns:40px repeat(24, 1fr);gap:3px;font-family:'JetBrains Mono',monospace;font-size:10px}
  .heat .hlabel{color:var(--dim);display:flex;align-items:center;height:18px}
  .heat .hcell{height:18px;border-radius:3px;background:oklch(1 0 0 /.04);cursor:pointer;transition:transform .1s}
  .heat .hcell:hover{transform:scale(1.3);z-index:2;outline:1px solid var(--accent)}
  .heat .hhead{color:var(--dim);text-align:center;font-size:9.5px}

  /* playbooks */
  .pb-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
  .pb{
    background:linear-gradient(180deg, var(--panel), var(--panel-2));
    border:1px solid var(--line);border-radius:var(--radius);
    padding:18px;display:flex;flex-direction:column;gap:12px;
    transition:all .15s;
  }
  .pb:hover{border-color:oklch(0.74 0.16 160 /.35);transform:translateY(-2px)}
  .pb .pb-top{display:flex;align-items:flex-start;gap:12px}
  .pb .pb-ico{width:38px;height:38px;border-radius:10px;background:var(--accent-soft);display:grid;place-items:center;color:var(--accent);flex-shrink:0}
  .pb h3{font-size:14px;font-weight:600;letter-spacing:-.005em}
  .pb p{font-size:12.5px;color:var(--mute);margin-top:4px;line-height:1.5}
  .pb .pb-foot{display:flex;align-items:center;justify-content:space-between;padding-top:10px;border-top:1px solid var(--line);margin-top:auto}
  .pb .pb-tag{font-size:10.5px;color:var(--dim);font-family:'JetBrains Mono',monospace}
  .pb .btn{padding:7px 14px;border-radius:8px;font-size:12px;font-weight:600;border:1px solid oklch(0.74 0.16 160 /.4);background:var(--accent-soft);color:var(--accent);cursor:pointer;transition:all .15s;font-family:inherit}
  .pb .btn:hover{background:oklch(0.74 0.16 160 /.22)}
  .pb.destructive .pb-ico{background:oklch(0.68 0.22 25 / .14);color:var(--crit)}
  .pb.destructive .btn{border-color:oklch(0.68 0.22 25 /.4);background:oklch(0.68 0.22 25 /.10);color:var(--crit)}
  .pb.destructive .btn:hover{background:oklch(0.68 0.22 25 /.2)}

  /* info row */
  .info-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px dashed var(--line);font-size:13px}
  .info-row:last-child{border-bottom:none}
  .info-row .k{color:var(--mute)}
  .info-row .v{font-weight:500}
  .info-row .v.acc{color:var(--accent)}

  /* modal */
  .modal-bg{
    position:fixed;inset:0;background:oklch(0 0 0 /.55);backdrop-filter:blur(4px);
    z-index:50;display:grid;place-items:center;animation:fadeIn .2s;
  }
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  .modal{
    background:var(--bg-2);border:1px solid var(--line-2);border-radius:16px;
    padding:28px;width:min(480px,90vw);box-shadow:0 20px 60px oklch(0 0 0 /.5);
    animation:rise .25s ease;
  }
  @keyframes rise{from{transform:translateY(12px);opacity:0}to{transform:none;opacity:1}}
  .modal h2{font-size:18px;margin-bottom:6px;letter-spacing:-.01em}
  .modal p{color:var(--mute);font-size:13.5px;margin-bottom:18px;line-height:1.5}
  .modal .mrow{background:oklch(1 0 0 /.04);border:1px solid var(--line);border-radius:10px;padding:12px 14px;margin-bottom:16px;font-size:12px}
  .modal .mrow .k{color:var(--dim);font-size:10.5px;text-transform:uppercase;letter-spacing:.1em;margin-bottom:3px}
  .modal .foot{display:flex;gap:10px;justify-content:flex-end}
  .modal button{padding:9px 16px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:1px solid var(--line-2);background:transparent;color:var(--ink);font-family:inherit}
  .modal button.primary{background:var(--accent);color:oklch(0.15 0 0);border-color:var(--accent)}
  .modal button.danger{background:var(--crit);color:white;border-color:var(--crit)}

  /* command palette */
  .cmdk-bg{position:fixed;inset:0;background:oklch(0 0 0 /.55);backdrop-filter:blur(4px);z-index:60;animation:fadeIn .15s}
  .cmdk{position:fixed;top:12%;left:50%;transform:translateX(-50%);width:min(560px,92vw);background:var(--bg-2);border:1px solid var(--line-2);border-radius:14px;box-shadow:0 30px 80px oklch(0 0 0 /.6);z-index:61;overflow:hidden;animation:rise .18s}
  .cmdk input{width:100%;padding:16px 18px;border:none;background:transparent;color:var(--ink);font:inherit;font-size:15px;outline:none;border-bottom:1px solid var(--line)}
  .cmdk input::placeholder{color:var(--dim)}
  .cmdk ul{list-style:none;max-height:360px;overflow:auto;padding:8px}
  .cmdk li{padding:10px 12px;border-radius:8px;display:flex;align-items:center;gap:10px;font-size:13px;cursor:pointer;color:var(--mute)}
  .cmdk li.sel{background:var(--accent-soft);color:var(--ink)}
  .cmdk li .grp{margin-left:auto;font-size:10.5px;color:var(--dim);font-family:'JetBrains Mono',monospace}

  /* tweaks */
  .tweaks{position:fixed;bottom:20px;right:20px;width:280px;background:var(--bg-2);border:1px solid var(--line-2);border-radius:14px;padding:16px;z-index:40;box-shadow:0 16px 40px oklch(0 0 0 /.4);display:none}
  .tweaks.on{display:block;animation:rise .2s}
  .tweaks h4{font-size:11px;color:var(--dim);text-transform:uppercase;letter-spacing:.14em;margin-bottom:12px}
  .tweaks .tw-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;font-size:13px}
  .tweaks .seg{display:inline-flex;background:oklch(1 0 0 /.05);border:1px solid var(--line-2);border-radius:8px;padding:2px}
  .tweaks .seg button{padding:4px 10px;border:none;background:transparent;color:var(--mute);font-size:11.5px;border-radius:6px;cursor:pointer;font-family:inherit}
  .tweaks .seg button.on{background:var(--accent-soft);color:var(--accent)}

  /* toast */
  .toast-wrap{position:fixed;top:74px;right:20px;z-index:70;display:flex;flex-direction:column;gap:10px}
  .toast{
    background:var(--bg-2);border:1px solid oklch(0.74 0.16 160 /.4);border-left:3px solid var(--accent);
    padding:12px 16px;border-radius:10px;font-size:12.5px;min-width:260px;box-shadow:0 10px 30px oklch(0 0 0 /.3);
    animation:rise .25s; display:flex;align-items:flex-start;gap:10px;
  }
  .toast .tt{font-weight:600;color:var(--ink)}
  .toast .td{color:var(--mute);font-size:11.5px;margin-top:2px}
  .toast.out{animation:fadeOut .3s forwards}
  @keyframes fadeOut{to{opacity:0;transform:translateX(20px)}}

  /* misc */
  .empty{padding:50px 20px;text-align:center;color:var(--dim);font-size:13px}
  .region-flag{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--mute);letter-spacing:.05em}
  .t-dim{color:var(--dim)}
  .divider{height:1px;background:var(--line);margin:14px 0}

  @media (max-width:1100px){ .grid-4{grid-template-columns:repeat(2,1fr)} .grid-3{grid-template-columns:1fr} .grid-2{grid-template-columns:1fr} .pb-grid{grid-template-columns:1fr} }
  @media (max-width:820px){ #app{grid-template-columns:1fr} .side{display:none} }
</style>
</head>
<body>

const Sparkline = ({data, color="var(--accent)", height=30, fill=true}) => {
  if(!data || data.length < 2) return null;
  const w = 100, h = height;
  const max = Math.max(...data), min = Math.min(...data);
  const range = max - min || 1;
  const step = w/(data.length-1);
  const pts = data.map((v,i)=> `${i*step},${h - ((v-min)/range)*(h-4) - 2}`).join(" ");
  const area = `0,${h} ${pts} ${w},${h}`;
  return (
    <svg className="spark-sm" viewBox={`0 0 ${w} ${h}`} preserveAspectRatio="none">
      {fill && <polyline points={area} fill={color} opacity="0.16" />}
      <polyline points={pts} fill="none" stroke={color} strokeWidth="1.5" strokeLinejoin="round" strokeLinecap="round"/>
    </svg>
  );
};

const Heatmap = () => {
  const days = ["CRIT","HIGH","MED","LOW"];
  const colors = {CRIT:"var(--crit)", HIGH:"var(--high)", MED:"var(--med)", LOW:"var(--low)"};
  const grid = useMemo(()=> days.map(() =>
    Array.from({length:24}, (_,h) => Math.max(0, Math.round(Math.sin(h/3)*3 + Math.random()*5 - (h<6?2:0))))
  ),[]);
  const max = Math.max(...grid.flat(), 1);
  return (
    <div className="heat" style={{marginTop:10}}>
      <div/>
      {Array.from({length:24}, (_,h) => <div key={h} className="hhead">{h.toString().padStart(2,'0')}</div>)}
      {days.map((d,ri) => (
        <React.Fragment key={d}>
          <div className="hlabel">{d}</div>
          {grid[ri].map((v,ci) => (
            <div key={ci} className="hcell" title={`${d} ${ci}:00 — ${v} events`}
              style={{background:`oklch(from ${colors[d]} l c h / ${0.08 + (v/max)*0.85})`}}/>
          ))}
        </React.Fragment>
      ))}
    </div>
  );
};

// ------------- COMMAND PALETTE -------------
const CMDK = ({open, onClose, setView, events}) => {
  const [q, setQ] = useState("");
  const [sel, setSel] = useState(0);
  const items = useMemo(() => {
    const nav = [
      {grp:"Go to", name:"Dashboard",  act:()=>setView("dashboard")},
      {grp:"Go to", name:"Events",     act:()=>setView("events")},
      {grp:"Go to", name:"Statistics", act:()=>setView("stats")},
      {grp:"Go to", name:"Playbooks",  act:()=>setView("playbooks")},
      {grp:"Go to", name:"Health",     act:()=>setView("health")},
    ];
    const pbs = PLAYBOOKS.map(p => ({grp:"Playbook", name:`Run · ${p.name}`, act:()=>{setView("playbooks")}}));
    const evs = events.slice(0,10).map(e => ({grp:"Event", name:`#${e.id} · ${e.type} · ${e.ip}`, act:()=>setView("events")}));
    return [...nav, ...pbs, ...evs].filter(x => q==="" || x.name.toLowerCase().includes(q.toLowerCase()) || x.grp.toLowerCase().includes(q.toLowerCase()));
  },[q,events]);

  useEffect(()=>{ setSel(0); },[q,open]);
  useEffect(()=>{
    if(!open) return;
    const k = (e) => {
      if(e.key === "Escape") onClose();
      if(e.key === "ArrowDown"){ e.preventDefault(); setSel(s => Math.min(s+1, items.length-1)); }
      if(e.key === "ArrowUp"){ e.preventDefault(); setSel(s => Math.max(s-1, 0)); }
      if(e.key === "Enter" && items[sel]){ items[sel].act(); onClose(); }
    };
    window.addEventListener("keydown", k);
    return () => window.removeEventListener("keydown", k);
  },[open,items,sel,onClose]);

  if(!open) return null;
  return (
    <>
      <div className="cmdk-bg" onClick={onClose}/>
      <div className="cmdk">
        <input autoFocus value={q} onChange={e=>setQ(e.target.value)} placeholder="Search commands, events, playbooks…"/>
        <ul>
          {items.length === 0 && <li style={{color:"var(--dim)"}}>No matches</li>}
          {items.map((it,i) => (
            <li key={i} className={i===sel?"sel":""} onClick={()=>{it.act();onClose();}} onMouseEnter={()=>setSel(i)}>
              <Icon name={it.grp==="Go to"?"arrow":it.grp==="Playbook"?"bolt":"circle"} size={13}/>
              <span>{it.name}</span>
              <span className="grp">{it.grp}</span>
            </li>
          ))}
        </ul>
      </div>
    </>
  );
};

const NAV = [
  {id:"dashboard", name:"Dashboard",  ico:"dashboard"},
  {id:"events",    name:"Events",     ico:"bolt", badge:"LIVE"},
  {id:"stats",     name:"Statistics", ico:"chart"},
  {id:"playbooks", name:"Playbooks",  ico:"book"},
  {id:"health",    name:"Health",     ico:"heart"},
];

const App = () => {
  const [view, setViewRaw] = useState(() => localStorage.getItem("go-view") || "dashboard");
  const setView = (v) => { setViewRaw(v); localStorage.setItem("go-view", v); };
  const [events, setEvents] = useState(SEED_EVENTS);
  const [cmdk, setCmdk] = useState(false);
  const [pbModal, setPbModal] = useState(null);
  const [audit, setAudit] = useState([]);
  const [toasts, setToasts] = useState([]);
  const [tweaksOpen, setTweaksOpen] = useState(false);
  const [tw, setTw] = useState(TWEAKS);

  // apply tweaks live
  useEffect(() => {
    document.documentElement.setAttribute("data-theme", tw.theme);
    document.documentElement.style.setProperty("--accent",   `oklch(0.74 0.16 ${tw.accentHue})`);
    document.documentElement.style.setProperty("--accent-2", `oklch(0.82 0.12 ${tw.accentHue+5})`);
    document.documentElement.style.setProperty("--accent-soft", `oklch(0.74 0.16 ${tw.accentHue} / .14)`);
  },[tw]);

  // sync with host Tweaks toggle
  useEffect(() => {
    const onMsg = (e) => {
      if(!e.data || !e.data.type) return;
      if(e.data.type === "__activate_edit_mode")   setTweaksOpen(true);
      if(e.data.type === "__deactivate_edit_mode") setTweaksOpen(false);
    };
    window.addEventListener("message", onMsg);
    window.parent.postMessage({type:"__edit_mode_available"}, "*");
    return () => window.removeEventListener("message", onMsg);
  },[]);

  const setTweak = (patch) => {
    setTw(t => ({...t, ...patch}));
    window.parent.postMessage({type:"__edit_mode_set_keys", edits:patch}, "*");
  };

  // live event stream — push a new event every 9-14 seconds
  useEffect(() => {
    let cancel = false;
    const tick = () => {
      if(cancel) return;
      const ext = Math.random() > .45;
      const sev = SYNTH_SEV[Math.floor(Math.random()*SYNTH_SEV.length)];
      const nev = {
        id: Date.now()%100000,
        ts: new Date().toISOString().slice(0,19).replace('T',' '),
        ip: randIP(ext),
        type: SYNTH_TYPES[Math.floor(Math.random()*SYNTH_TYPES.length)],
        severity: sev,
        status: sev === "CRITICAL" || sev === "HIGH" ? "Auto-Blocked" : (Math.random()>.5?"Investigating":"Resolved"),
        region: SYNTH_REGIONS[Math.floor(Math.random()*SYNTH_REGIONS.length)],
        iptype: ext?"external":"internal",
        user: ext?"anon":"svc-app",
        _new: true
      };
      setEvents(ev => [nev, ...ev].slice(0, 60));
      if(sev === "CRITICAL") pushToast({title:"Critical threat detected", desc:`${nev.type} from ${nev.ip}`, ico:"bolt"});
      setTimeout(tick, 9000 + Math.random()*5000);
    };
    const t = setTimeout(tick, 6000);
    return () => { cancel = true; clearTimeout(t); };
  },[]);

  const pushToast = (t) => {
    const id = Math.random().toString(36).slice(2);
    setToasts(list => [...list, {...t, id}]);
    setTimeout(()=> setToasts(list => list.map(x => x.id===id?{...x,out:true}:x)), 4000);
    setTimeout(()=> setToasts(list => list.filter(x => x.id!==id)), 4400);
  };

  // cmd+k
  useEffect(() => {
    const k = (e) => {
      if((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === "k"){ e.preventDefault(); setCmdk(c => !c); }
    };
    window.addEventListener("keydown", k);
    return () => window.removeEventListener("keydown", k);
  },[]);

  const stats = useMemo(() => ({
    total: events.length,
    critical: events.filter(e=>e.severity==="CRITICAL").length,
    high:     events.filter(e=>e.severity==="HIGH").length,
    medium:   events.filter(e=>e.severity==="MEDIUM").length,
    low:      events.filter(e=>e.severity==="LOW").length,
    blocked:  events.filter(e=>e.status==="Auto-Blocked").length,
  }), [events]);

  const openPlaybook = (pb) => {
    const t = pb.id === "ip-quar" ? (events.find(e=>e.iptype==="external")?.ip || "—")
            : pb.id === "key-rot" ? "svc-deploy"
            : pb.id === "sess-rev" ? "user:anon-session"
            : pb.id === "mfa" ? "role/admin"
            : pb.id === "report" ? "INC-2026-0422" : "SOC-L2";
    setPbModal({pb, target: t});
  };
  const confirmPlaybook = (pb) => {
    setPbModal(null);
    const a = {name: pb.name, ts: new Date().toISOString().slice(0,19).replace('T',' '), target: "svc-deploy", ico: pb.ico};
    setAudit(x => [a, ...x].slice(0,8));
    pushToast({title:`${pb.name} executed`, desc:"Audit entry recorded · webhook fired to SOC.", ico:pb.ico});
  };
  // -------------------- ROOT APP --------------------
const App = () => {
  const [events, setEvents] = useState(SEED_EVENTS);

  // simple stats calculation (auto-updates if events change)
  const stats = useMemo(() => {
    const s = { critical: 0, high: 0, medium: 0, low: 0, blocked: 0, total: events.length };

    events.forEach(e => {
      if (e.severity === "CRITICAL") s.critical++;
      if (e.severity === "HIGH") s.high++;
      if (e.severity === "MEDIUM") s.medium++;
      if (e.severity === "LOW") s.low++;
      if (e.status === "Auto-Blocked") s.blocked++;
    });

    return s;
  }, [events]);

  return (
    <DashboardView
      events={events}
      stats={stats}
    />
  );
};

        <div className="side-foot">

        </div>
      </aside>

      <div className="main">

            <input placeholder="Search events, IPs, playbooks…" onFocus={()=>setCmdk(true)}/>
            <span className="kbd">⌘K</span>
          </div>

        <div className="view" key={view} data-screen-label={`${view}`}>
          {view === "dashboard" && <DashboardView events={events} stats={stats} openPlaybook={openPlaybook}/>}
          {view === "events"    && <EventsView events={events}/>}

      {pbModal && <PlaybookModal pb={pbModal.pb} target={pbModal.target} onClose={()=>setPbModal(null)} onConfirm={confirmPlaybook}/>}

  );
};
